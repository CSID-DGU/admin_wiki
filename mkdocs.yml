site_name: Server Manage 운영 위키
site_description: DECS 서버 관리 코드의 핵심 기능, 모듈 경계, 설계 의도와 운영 절차
docs_dir: wiki-docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: ko
  font: false
  palette:
    - scheme: default
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: 어두운 화면으로 전환
    - scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: 밝은 화면으로 전환
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.tracking
    - navigation.path
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang:
        - ko
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - stylesheets/extra.css

nav:
  - 목차: index.md
  - backend:
      - 목차: backend/index.md
      - 개요: backend/개요.md
      - 시스템 아키텍처: backend/시스템-아키텍처.md
      - 코드 컨벤션: backend/코드-컨벤션.md
      - 운영 가이드: backend/운영-가이드.md
      - 시작 가이드: backend/시작.md
      - 도메인 설명: backend/도메인-설명.md
      - 핵심 설계 패턴: backend/핵심-설계-패턴.md
      - 인증·보안: backend/인증-보안.md
      - 외부 연동: backend/외부-연동.md
      - Redis 키 카탈로그: backend/Redis-키-카탈로그.md
      - Redis 메시지 큐 작동 원리: backend/Redis-메시지-큐-작동-원리.md
      - 우분투 계정 삭제 스케줄러: backend/우분투-계정-삭제-스케줄러.md
  - frontend: frontend/index.md
  - infra: infra/index.md
  - system:
      - 목차: system/index.md
      - container-images: system/container-images.md
      - user-lifecycle: system/user-lifecycle.md
      - server-state: system/server-state.md
      - remote-operations: system/remote-operations.md
      - monitoring: system/monitoring.md
      - kerberos-nfs: system/kerberos-nfs.md
  - user: user/index.md
  - PDF 다운로드: downloads.md
