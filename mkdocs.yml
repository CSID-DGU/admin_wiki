          - 설계: infra/kdc-setup/design.md
          - 운영: infra/kdc-setup/operations.md
          - 설정: infra/kdc-setup/config.md
  - system:
      - 목차: system/index.md
      - container-images:
          - 개요: system/container-images/index.md
          - 설계: system/container-images/design.md
          - 운영: system/container-images/operations.md
      - user-lifecycle:
