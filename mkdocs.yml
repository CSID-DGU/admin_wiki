          - 설계: system/user-lifecycle/design.md
          - 운영: system/user-lifecycle/operations.md
      - server-state:
          - 개요: system/server-state/index.md
          - 설계: system/server-state/design.md
          - 운영: system/server-state/operations.md
      - remote-operations:
          - 개요: system/remote-operations/index.md
          - 설계: system/remote-operations/design.md
          - 운영: system/remote-operations/operations.md
          - 설정: system/remote-operations/config.md
      - monitoring:
